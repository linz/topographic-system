name: Test Data PR Review Workflow
on: pull_request

jobs:
  build:
    uses: ./.github/workflows/containers.yml
    with:
      manifest: '{"kart": ["test-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}"]}'
      push: true
      environment: nonprod

  test:
    needs: build
    uses: ./.github/workflows/data-review.yml
    with:
      clone_url: https://github.com/blacha/kart-test.git
      head_ref: master
      environment: nonprod
      changed_datasets_only: false
      output: file:///work/test-output/
      kart_version: 'test-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}'

  cleanup:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const org = context.repo.owner;
            const pkg = `${context.repo.repo}/kart`;
            const tag = `test-${context.payload.pull_request.number}-${context.payload.pull_request.head.sha}`;
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
              {
                package_type: 'container',
                package_name: pkg,
                org,
                per_page: 100,
              }
            );

            const version = versions.find(v =>
              v.metadata.container.tags.includes(tag)
            );

            if (version) {
              await github.rest.packages.deletePackageVersionForOrg({
                package_type: 'container',
                package_name: pkg,
                org,
                package_version_id: version.id,
              });
              core.info(`Deleted kart:${tag}`);
            } else {
              core.warning(`No version found with tag ${tag}`);
            }
