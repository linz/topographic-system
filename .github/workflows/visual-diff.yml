name: visual-diff

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub environment to run the workflow in.'
        required: true
        type: string
      map_version:
        description: 'Version of topographic-system map container to use.'
        required: true
        type: string
      project:
        description: 'URL of the project stac item to run visual diff on.'
        required: true
        type: string
      data:
        description: 'Optional path to download the source data for the project, that override the default data from project.'
        type: string

jobs:
  produce-mapsheets:
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}
    container:
      image: ghcr.io/linz/topographic-system/map:${{ inputs.map_version }}
    permissions:
      id-token: write
      contents: read
    name: Produce Png Mapsheets
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ENVIRONMENT: ${{ inputs.environment }}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      OTEL_RESOURCE_ATTRIBUTES: 'deployment.environment=github.${{ inputs.environment }}'
      CLOUD_FRONT_HOST: ${{ inputs.environment == 'nonprod' && 'https://d1jzh93b1t1cv.cloudfront.net/' || 'https://d2h9vml0if6bs.cloudfront.net/' }}

    steps:
      - name: Setup Otel
        uses: linz/action-otel@master

      - name: Check versions
        run: |
          node --version
          node /app/index.cjs version

      - name: AWS Configure
        uses: aws-actions/configure-aws-credentials@v4.0.1
        with:
          aws-region: ap-southeast-2
          mask-aws-account-id: true
          role-to-assume: ${{ secrets.AWS_ROLE_SCREENSHOT }}

      - name: Produce mapsheets
        run: |
          node /app/index.cjs \
          visual-diff \
          --output $PWD/.artifacts/visual-snapshots \
          --project ${{ inputs.project }} \
          --cloud-front "$CLOUD_FRONT_HOST" \
          ${{ inputs.data && format('--data {0}', inputs.data) || '' }}

      - name: Save snapshots
        uses: linz/action-visual-snapshot@v2.1
        with:
          save-only: true
          snapshot-path: .artifacts/visual-snapshots

  visual-diff:
    environment: ${{ inputs.environment }}
    if: github.ref != 'refs/heads/master'
    permissions:
      id-token: write
      contents: write
      checks: write
      actions: read
    needs: produce-mapsheets
    name: Compare Visual Diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: AWS Configure
        uses: aws-actions/configure-aws-credentials@v4.0.1
        with:
          aws-region: ap-southeast-2
          mask-aws-account-id: true
          role-to-assume: ${{ secrets.AWS_ROLE_SCREENSHOT }}

      - name: Diff snapshots
        id: visual-snapshots-diff
        uses: linz/action-visual-snapshot@v2.1
        env:
          GITHUB_WORKFLOW: push
        with:
          storage-prefix: ${{ inputs.environment == 'prod' && 's3://linz-topography-screenshot' || 's3://linz-topography-screenshot-nonprod' }}
          storage-url: 'https://d2glsbt6gvd4ll.cloudfront.net'
