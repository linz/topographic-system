name: push

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version

      - run: npm ci
      - run: npm run build
      - run: npm run check
      - run: npm run test

      - name: Python CI
        uses: ./.github/actions/python-ci

  build-container:
    uses: ./.github/workflows/containers.yml
    with:
      manifest: '{ "map": [], "kart": [] }'
    secrets: inherit

  visual-diff:
    needs: build-container
    uses: ./.github/workflows/visual-diff.yml
    with:
      environment: "${{ startsWith(github.event.pull_request.title, 'chore: release') && 'prod' || 'nonprod' }}"
      map_version: 'git-${{ github.sha }}'
      project: s3://linz-topography-nonprod/qgis/latest/nztopo50map/nz-topo50-map.json
    secrets: inherit

  test-kart-workflow:
    needs: build-container
    uses: ./.github/workflows/data-review.yml
    secrets: inherit
    with:
      clone_url: https://github.com/linz/topographic-test-data.git
      head_ref: master
      environment: nonprod
      changed_datasets_only: false
      output: file:///tmp/topographic-data/
      kart_version: 'git-${{ github.sha }}'

  test-kart-integration:
    needs: build-container
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/kart:git-${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
      - run: npm ci
      - name: Run kart integration tests
        run: npm run test:integration
        env:
          CI_REQUIRE_TOOLS: 'true'
          KART_ENTRYPOINT: /app/index.cjs
