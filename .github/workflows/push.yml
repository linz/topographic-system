name: push

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version

      - run: npm ci
      - run: npm run build
      - run: npm run check
      - run: npm run test

      - name: Python CI
        uses: ./.github/actions/python-ci

  build-container:
    uses: ./.github/workflows/containers.yml
    with:
      manifest: '{ "map": [], "kart": [] }'
    secrets: inherit

  visual-diff:
    needs: build-container
    uses: ./.github/workflows/visual-diff.yml
    with:
      environment: "${{ startsWith(github.event.pull_request.title, 'chore: release') && 'prod' || 'nonprod' }}"
      is-pr: ${{ github.ref != 'refs/heads/master' && github.event_name == 'pull_request' }}
    secrets: inherit

  test-kart:
    needs: build-container
    uses: ./.github/workflows/data-review.yml
    with:
      clone_url: https://github.com/linz/topographic-test-data.git
      head_ref: master
      environment: nonprod
      changed_datasets_only: false
      output: file:///tmp/topographic-data/
      kart_version: 'git-${{ github.sha }}'
