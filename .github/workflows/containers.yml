name: Containers

on:
  workflow_call:
    inputs:
      manifest:
        required: true
        type: string
        description: 'JSON object mapping package names to tag lists, e.g. "{''map'': [''latest'']}"'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      manifest: ${{ steps.matrix.outputs.manifest }}
      environment: ${{ steps.matrix.outputs.environment }}
    steps:
      - id: matrix
        uses: actions/github-script@v8
        with:
          script: |
            const manifest = JSON.parse(`${{ inputs.manifest }}`);
            const isMaster = "${{ github.ref }}" === "refs/heads/master";
            const isPullRequest = "${{ github.event_name }}" === "pull_request";

            const environment = isMaster ? "prod" : "nonprod";

            const newTags = ["git-${{ github.sha }}"];
            if (isPullRequest) newTags.push("pr-${{ github.event.number }}");
            if (isMaster) newTags.push("latest");

            for (const tags of Object.values(manifest)) {
              for (const newTag of newTags){
                if (!tags.includes(newTag)) tags.push(newTag);
              }
            }

            core.setOutput('matrix', JSON.stringify(Object.keys(manifest)));
            core.setOutput('manifest', JSON.stringify(manifest));
            core.setOutput('environment', environment);

  build:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - run: npm ci
      - run: npm run build
      - run: npm run check
      - run: npm run test

      - name: Bundle the packages
        run: npx lerna run bundle --stream

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure tag exists
        run: |
          git fetch --depth=1 origin +refs/tags/*:refs/tags/* # see https://stackoverflow.com/a/60184319/9285308

      - name: Calculate Version for Build Args
        id: version
        run: |
          GIT_VERSION=$(git describe --tags --always --match '${{ matrix.package }}-v*')
          echo "version=${GIT_VERSION#${{matrix.package}}-}" >> $GITHUB_OUTPUT

      - name: Generate Tags
        id: tags
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const manifest = JSON.parse(`${{ needs.setup.outputs.manifest }}`);
            const pkg = '${{ matrix.package }}';
            const fullRepo = '${{ github.repository }}';

            const rawTags = manifest[pkg];
            if (!Array.isArray(rawTags)) throw new Error(`No tags found for package ${pkg}`);

            const imageTags = rawTags.map(t => `ghcr.io/${fullRepo}/${pkg}:${t}`);

            // Add git describe tag only if the only tag is "latest"
            if (rawTags.includes('latest')) {
              imageTags.push(`ghcr.io/${fullRepo}/${pkg}:${{ steps.version.outputs.version }}`);
            }

            return imageTags.join('\n');

      - name: Create docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/${{ matrix.package }}/Dockerfile
          tags: ${{ steps.tags.outputs.result }}
          push: true
          load: true
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_VERSION=${{ steps.version.outputs.version }} 
            GITHUB_RUN_ID=${{ github.run_id}}

      - name: Ensure container built
        run: |
          FIRST_TAG=$(echo "${{ steps.tags.outputs.result }}" | head -n 1)
          docker run --rm ${FIRST_TAG}

          docker run --rm -v $PWD:$PWD --entrypoint "sh" ${FIRST_TAG} -c "cd $PWD/packages/${{matrix.package}} && npm run test:container --if-present"
