name: Data PR Review

on:
  workflow_call:

jobs:
  kart:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/linz/topographic-system/kart:v0.4.0 # x-release-please-version

    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write

    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ENVIRONMENT: nonprod

    environment:
      name: nonprod

    steps:
      - name: Check kart version
        run: node /scripts/index.cjs version

      - name: Clone repository
        run: node /scripts/index.cjs clone ${{ github.event.repository.clone_url }} --ref ${{ github.head_ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate diff
        run: node /scripts/index.cjs diff

      - name: Comment on PR
        run: node /scripts/index.cjs pr-comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v5
        with:
          name: diff
          path: |
            pr_summary.md
            diff/

      - name: Export changed datasets
        run: node /scripts/index.cjs export --changed-datasets-only

      - name: Configuqre AWS Credentials
        if: ${{env.AWS_ROLE_ARN != ''}}
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a # v4
        with:
          aws-region: ap-southeast-2
          mask-aws-account-id: true
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Convert to parquet
        run: node /scripts/index.cjs to-parquet

      - name: Validate datasets
        run: node /scripts/index.cjs validate