name: Data PR Review
on:
  workflow_call:
    inputs:
      clone_url:
        description: 'URL of the repository to clone. Defaults to the calling repository.'
        type: string
        default: ''
      head_ref:
        description: 'Branch ref to checkout. Defaults to the calling pull request branch.'
        type: string
        default: ''
      environment:
        description: 'GitHub environment to run the workflow in.'
        type: string
        required: true
      changed_datasets_only:
        description: 'Whether to only process changed datasets.'
        type: boolean
        default: true
      output:
        description: 'Location of root catalog.'
        type: string
        required: true
      kart_version:
        description: 'Version of kart to use.'
        type: string
        default: 'v0.4.0' # x-release-please-version

jobs:
  kart:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/linz/topographic-system/kart:${{ inputs.kart_version }}
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ENVIRONMENT: ${{ inputs.environment }}
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Check kart version
        run: node /scripts/index.cjs version

      - name: Clone repository
        run: node /scripts/index.cjs clone ${{ inputs.clone_url != '' && inputs.clone_url || github.event.repository.clone_url }} --ref ${{ inputs.head_ref != '' && inputs.head_ref || github.head_ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate diff
        run: node /scripts/index.cjs diff

      - name: Comment on PR
        run: node /scripts/index.cjs pr-comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v5
        with:
          name: diff
          path: |
            pr_summary.md
            diff/

      - name: Export changed datasets
        run: node /scripts/index.cjs export --changed-datasets-only=${{ inputs.changed_datasets_only }}

      - name: Configure AWS Credentials
        if: ${{ env.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a # v4
        with:
          aws-region: ap-southeast-2
          mask-aws-account-id: true
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Convert to parquet
        run: node /scripts/index.cjs to-parquet --output ${{ inputs.output }}

      - name: Validate datasets
        run: node /scripts/index.cjs validate --output ${{ inputs.output }}
