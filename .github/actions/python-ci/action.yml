name: 'Python CI'
description: 'Lint, test and type check Python code'

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
      with:
        version: '0.11.8'
        enable-cache: true
        cache-dependency-glob: 'uv.lock'

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: uv sync --all-extras --dev

    - name: Lint
      shell: bash
      run: uv run ruff check

    - name: Format
      shell: bash
      run: uv run ruff format --check

    - name: Type check
      shell: bash
      run: uv run mypy .

    - name: Test
      shell: bash
      run: uv run pytest
