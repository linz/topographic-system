  - source: kart@data.koordinates.com:linz/nz-swamp-points-topo-150k
    name: nz_swamp_points_topo_150k
    mapping:
      t50_fid: $
      type: swamp
      name: $
  - source: kart@data.koordinates.com:linz/nz-auckland-island-swamp-points-topo-150k
    name: nz_auckland_island_swamp_points_topo_150k
    mapping:
      t50_fid: $
