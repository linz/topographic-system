[project]
name = "topographic-system-kart-import"
version = "0.1.0"
description = "Package to import topographic data from kart repositories (LINZ Data Service), apply transformations and load into a new harmonized repository, including historic versions."
readme = "README.md"
authors = [
    { name = "Blayne Chard", email = "bchard@linz.govt.nz" },
    { name = "Tobias Schmidt", email = "tschmidt@linz.govt.nz" },
]
requires-python = ">=3.12,<3.14"
dependencies = [
    "dask-geopandas>=0.5.0",
    "geopandas>=1.1.3",
    "opentelemetry-sdk>=1.0.0",
    "pyyaml>=6.0.3",
    "snakemake>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kart_import"]

