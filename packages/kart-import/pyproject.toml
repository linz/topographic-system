[project]
name = "topographic-system-kart-import"
version = "0.1.0"
description = ""
readme = "README.md"
dependencies = [
    "dagster>=1.13.2",
    "dagster-dg-cli>=1.13.2",
    "dagster-webserver>=1.13.2",
    "geopandas>=1.1.3",
    "pyyaml>=6.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kart_import"]

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "kart_import"
code_location_target_module = "kart_import.definitions"

[tool.pytest.ini_options]
python_files = ["test_*.py", "*_test.py"]

[dependency-groups]
dev = [
    "uuid6>=2025.0.1",
]
