[project]
name = "topographic-data-schema"
version = "0.1.0"
description = "Schema definition and validation"
readme = "topographic-data/README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "geopandas>=0.14",
    "pyogrio",
    "pandas>=2.0",
    "openpyxl",
    "graphviz",
    "matplotlib",
]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"
