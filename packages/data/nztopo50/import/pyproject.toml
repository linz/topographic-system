[project]
name = "topographic-system-data-import"
version = "0.1.0"
description = "Data loading init tools for LINZ Topographic Data"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Andrew McMenamin", email = "amcmenamin@linz.govt.nz" }
]
dependencies = [
    "geopandas",
    "geoalchemy2>=0.19.0",
    "numpy>=2.4.4",
    "pandas",
    "openpyxl",
    "psycopg[binary]>=3.3.3",
    "pyogrio>=0.12.1",
    "shapely",
    "sqlalchemy>=2.0.49",
    "obstore",
    "pyarrow>=24.0.0",
]

[dependency-groups]
dev = [
    "mypy",
    "pytest",
    "ruff",
    "pandas-stubs",
    "types-pytz",
    "types-setuptools",
    "types-geopandas",  # Includes types-shapely as dependency
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
