[project]
name = "topographic-system-data-import"
version = "0.1.0"
description = "Data loading init tools for LINZ Topographic Data"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Andrew McMenamin", email = "amcmenamin@linz.govt.nz" }
]
dependencies = [
    "geopandas>=1.1.3",
    "numpy>=2.4.4",
    "pandas>=3.0.2",
    "psycopg>=3.3.3",
    "pyogrio>=0.12.1",
    "shapely>=2.1.2",
    "sqlalchemy>=2.0.49",
]
[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true