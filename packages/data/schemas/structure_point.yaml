$schema: https://json-schema.org/draft/2020-12/schema
$id: structure_point.yaml
type: object
properties:
  topo_id:
    type: string
    format: uuid
    description: UUID without braces. Unique identifier for the feature.
  fid: {}
  capture_method:
    $ref: common.yaml#/$defs/CaptureMethod
    default: manual
    description: How the feature was captured.
  change_type:
    $ref: common.yaml#/$defs/ChangeType
    default: new
    description: What kind of change this row represents.
  update_date:
    type: string
    format: date
    description: 'Must be on or after create_date. Default at write time: today.'
    formatMinimum:
      $data: 1/create_date
  create_date:
    type: string
    format: date
    description: 'Default at write time: today.'
  version:
    type: integer
    minimum: 1
    maximum: 2147483647
    default: 1
    description: Lifecycle counter; increments on each update.
  t50_fid: {}
  feature_type:
    anyOf:
      - type: string
        const: beacon
      - type: string
        const: bivouac
      - type: string
        const: buoy
      - type: string
        const: chimney
      - type: string
        const: dredge
      - type: string
        const: flare
      - type: string
        const: floodgate
      - type: string
        const: gate
      - type: string
        const: ladder
      - type: string
        const: mast
      - type: string
        const: redoubt
      - type: string
        const: shaft
      - type: string
        const: siphon
      - type: string
        const: stockyard
      - type: string
        const: tank
      - type: string
        const: tower
      - type: string
        const: well
      - type: string
        const: windmill
      - type: string
        const: wreck
      - type: 'null'
  structure_use:
    anyOf:
      - $ref: common.yaml#/$defs/StructureUseEnum
      - type: 'null'
  structure_type:
    anyOf:
      - $ref: common.yaml#/$defs/StructureTypeEnum
      - type: 'null'
  status:
    anyOf:
      - $ref: common.yaml#/$defs/StatusEnum
      - type: 'null'
  name:
    anyOf:
      - type: string
      - type: 'null'
  location:
    anyOf:
      - $ref: common.yaml#/$defs/LocationEnum
      - type: 'null'
  height:
    anyOf:
      - type: number
      - type: 'null'
  orientation:
    anyOf:
      - type: number
      - type: 'null'
  material:
    anyOf:
      - $ref: common.yaml#/$defs/MaterialEnum
      - type: 'null'
  restrictions:
    anyOf:
      - $ref: common.yaml#/$defs/RestrictionsEnum
      - type: 'null'
  stored_item:
    anyOf:
      - $ref: common.yaml#/$defs/StoredItemEnum
      - type: 'null'
  wreck_of:
    anyOf:
      - $ref: common.yaml#/$defs/WreckOfEnum
      - type: 'null'
  geometry:
    description: WKB geometry. Validation only checks presence + non-null; semantic checks live elsewhere.
    not:
      type: 'null'
  bbox:
    $ref: common.yaml#/$defs/BBox
required:
  - topo_id
  - fid
  - capture_method
  - change_type
  - update_date
  - create_date
  - version
  - geometry
additionalProperties: false
