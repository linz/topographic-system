$schema: https://json-schema.org/draft/2020-12/schema
$id: nz_topo50_carto_text.yaml
type: object
properties:
  topo_id:
    type: string
    format: uuid
    description: UUID without braces. Unique identifier for the feature.
  fid: {}
  full_text:
    anyOf:
      - type: string
      - type: 'null'
  text_bend:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  text_char_spacing_distance:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  text_colour:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  text_font:
    anyOf:
      - $ref: common.yaml#/$defs/TextFontEnum
      - type: 'null'
  text_height:
    anyOf:
      - type: number
      - type: 'null'
  text_placement:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  text_size_type:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  text_stretch_length:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  text_string:
    anyOf:
      - type: string
      - type: 'null'
  text_word_spacing_distance:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  font:
    anyOf:
      - $ref: common.yaml#/$defs/FontEnum
      - type: 'null'
  style:
    anyOf:
      - $ref: common.yaml#/$defs/StyleEnum
      - type: 'null'
  colour:
    anyOf:
      - $ref: common.yaml#/$defs/ColourEnum
      - type: 'null'
  size:
    anyOf:
      - type: number
      - type: 'null'
  placement:
    anyOf:
      - $ref: common.yaml#/$defs/PlacementEnum
      - type: 'null'
  offset:
    anyOf:
      - type: number
      - type: 'null'
  textanchor:
    anyOf:
      - $ref: common.yaml#/$defs/TextanchorEnum
      - type: 'null'
  labelanchor:
    anyOf:
      - type: number
      - type: 'null'
  charplace:
    anyOf:
      - $ref: common.yaml#/$defs/CharplaceEnum
      - type: 'null'
  chardistance:
    anyOf:
      - type: number
      - type: 'null'
  geometry:
    description: WKB geometry. Validation only checks presence + non-null; semantic checks live elsewhere.
    not:
      type: 'null'
  bbox:
    $ref: common.yaml#/$defs/BBox
required:
  - topo_id
  - fid
  - geometry
additionalProperties: false
