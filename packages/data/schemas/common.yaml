$schema: https://json-schema.org/draft/2020-12/schema
$id: common.yaml
$defs:
  AuditFields:
    type: object
    properties:
      capture_method:
        $ref: common.yaml#/$defs/CaptureMethod
        default: manual
        description: How the feature was captured.
      change_type:
        $ref: common.yaml#/$defs/ChangeType
        default: new
        description: What kind of change this row represents.
      update_date:
        type: string
        format: date
        description: 'Must be on or after create_date. Default at write time: today.'
        formatMinimum:
          $data: 1/create_date
      create_date:
        type: string
        format: date
        description: 'Default at write time: today.'
      version:
        type: integer
        minimum: 1
        maximum: 2147483647
        default: 1
        description: Lifecycle counter; increments on each update.
    required:
      - capture_method
      - change_type
      - update_date
      - create_date
      - version
    description: Capture / change-tracking columns shared by most features.
  BBox:
    type: object
    properties:
      xmin:
        type: number
      ymin:
        type: number
      xmax:
        type: number
      ymax:
        type: number
    required:
      - xmin
      - ymin
      - xmax
      - ymax
    description: GeoParquet 1.1 covering bbox struct.
  BridgeUse2Enum:
    type: string
    enum:
      - train
    description: Auto-derived from observed values of `bridge_use2`.
  BridgeUseEnum:
    type: string
