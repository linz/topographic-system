$schema: https://json-schema.org/draft/2020-12/schema
$id: nz_topo50_grid.yaml
type: object
properties:
  topo_id:
    type: string
    format: uuid
    description: UUID without braces. Unique identifier for the feature.
  fid: {}
  direction:
    anyOf:
      - $ref: common.yaml#/$defs/DirectionEnum
      - type: 'null'
  value:
    anyOf:
      - type: number
      - type: 'null'
  geometry:
    description: WKB geometry. Validation only checks presence + non-null; semantic checks live elsewhere.
    not:
      type: 'null'
  bbox:
    $ref: common.yaml#/$defs/BBox
required:
  - topo_id
  - fid
  - geometry
additionalProperties: false
