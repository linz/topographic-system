$schema: https://json-schema.org/draft/2020-12/schema
$id: place_point.yaml
type: object
properties:
  topo_id:
    type: string
    format: uuid
    description: UUID without braces. Unique identifier for the feature.
  fid: {}
  capture_method:
    $ref: common.yaml#/$defs/CaptureMethod
    default: manual
    description: How the feature was captured.
  change_type:
    $ref: common.yaml#/$defs/ChangeType
    default: new
    description: What kind of change this row represents.
  update_date:
    type: string
    format: date
    description: 'Must be on or after create_date. Default at write time: today.'
    formatMinimum:
      $data: 1/create_date
  create_date:
    type: string
    format: date
    description: 'Default at write time: today.'
  version:
    type: integer
    minimum: 1
    maximum: 2147483647
    default: 1
    description: Lifecycle counter; increments on each update.
  t50_fid: {}
  feature_type:
    anyOf:
      - type: string
        const: cave
      - type: string
        const: cemetery
      - type: string
        const: grave
      - type: string
        const: historic_site
      - type: string
        const: mine
      - type: string
        const: monument
      - type: string
        const: pa
      - type: string
        const: radar_dome
      - type: string
        const: saddle
      - type: string
        const: satellite_station
      - type: 'null'
  place_type:
    anyOf:
      - $ref: common.yaml#/$defs/PlaceTypeEnum
      - type: 'null'
  status:
    anyOf:
      - $ref: common.yaml#/$defs/StatusEnum
      - type: 'null'
  name:
    anyOf:
      - type: string
      - type: 'null'
  elevation:
    anyOf:
      - type: integer
        minimum: -2147483648
        maximum: 2147483647
      - type: 'null'
  composition:
    anyOf:
      - $ref: common.yaml#/$defs/CompositionEnum
      - type: 'null'
  description:
    anyOf:
      - type: string
      - type: 'null'
  orientation:
    anyOf:
      - type: number
      - type: 'null'
  substance:
    anyOf:
      - $ref: common.yaml#/$defs/SubstanceEnum
      - type: 'null'
  geometry:
    description: WKB geometry. Validation only checks presence + non-null; semantic checks live elsewhere.
    not:
      type: 'null'
  bbox:
    $ref: common.yaml#/$defs/BBox
required:
  - topo_id
  - fid
  - capture_method
  - change_type
  - update_date
  - create_date
  - version
  - geometry
additionalProperties: false
