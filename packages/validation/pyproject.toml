[project]
name = "topographic-system-validation"
version = "0.4.0"
description = "Data Validation scripts for LINZ Topographic Data"
requires-python = ">=3.12"
authors = [
    { name = "Andrew McMenamin", email = "AMcMenamin@linz.govt.nz" },
    { name = "Tobias Schmidt", email = "tschmidt@linz.govt.nz" }
]
dependencies = [
    "shapely>=2.0.0",
    "pandas>=2.2.0",
    "geopandas>=1.1.0",
    "pyogrio>=0.10.0",
    "sqlalchemy>=2.0.0",
    "psycopg>=3.2.0",
    "pyarrow>=16.0.0"
]

[dependency-groups]
dev = [
    "mypy>=1.11.0",
    "pytest>=8.3.0",
    "ruff>=0.6.0",
    "pandas-stubs>=2.2.0.240909",
    "types-pytz>=2025.2.0.20250326",
    "types-setuptools",
    "types-geopandas",  # Includes types-shapely as dependency
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true

[tool.uv]
package = true

[project.scripts]
topographic_validation = "topographic_validation.cli:main"