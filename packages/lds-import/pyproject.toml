[project]
name = "topographic-system-lds-import"
version = "0.1.0"
description = ""
readme = "README.md"
dependencies = [
    "dagster>=1.13.2",
    "dagster-dg-cli>=1.13.2",
    "dagster-webserver>=1.13.2",
    "geopandas>=1.1.3",
    "pyyaml>=6.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lds_import"]

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "lds_import"
code_location_target_module = "lds_import.definitions"
