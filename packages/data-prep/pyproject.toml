[project]
name = "topographic-system-data-prep"
version = "0.3.0"
requires-python = ">=3.12"

dependencies = [
    "pyarrow",
    "geopandas",
    "topographic-system-kart-import"
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "types-geopandas"
]

[tool.uv]
package = true

[tool.uv.sources]
topographic-system-kart-import = { workspace = true }